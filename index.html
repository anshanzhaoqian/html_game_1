<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石头剪刀布</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --primary: #e94560;
            --secondary: #0f3460;
            --text: #eee;
            --gold: #f0a500;
            --win: #2ecc71;
            --lose: #e74c3c;
            --draw: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(233, 68, 96, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(15, 52, 96, 0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(240, 165, 0, 0.06) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 20px;
        }

        /* 标题 */
        .title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--text);
            margin-bottom: 6px;
            text-shadow: 0 0 30px rgba(233, 68, 96, 0.5);
        }
        .title span {
            display: inline-block;
            animation: bounceTitle 0.6s ease-out;
        }
        .title span:nth-child(1) { animation-delay: 0s; }
        .title span:nth-child(2) { animation-delay: 0.06s; }
        .title span:nth-child(3) { animation-delay: 0.12s; }
        .title span:nth-child(4) { animation-delay: 0.18s; }
        .title span:nth-child(5) { animation-delay: 0.24s; }
        @keyframes bounceTitle {
            0% { transform: translateY(-30px); opacity: 0; }
            50% { transform: translateY(8px); }
            100% { transform: translateY(0); opacity: 1; }
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 计分板 */
        .scoreboard {
            background: var(--card);
            border-radius: 16px;
            padding: 18px 24px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 16px;
        }
        .score-item {
            text-align: center;
        }
        .score-label {
            font-size: 0.75rem;
            color: #999;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .score-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
            transition: transform 0.15s ease;
        }
        .score-value.pulse {
            animation: pulseScore 0.4s ease;
        }
        @keyframes pulseScore {
            0% { transform: scale(1); }
            40% { transform: scale(1.35); }
            100% { transform: scale(1); }
        }
        .score-divider {
            width: 1px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
        }
        .score-item.player .score-value { color: #5dade2; }
        .score-item.computer .score-value { color: var(--primary); }
        .score-item.draws .score-value { color: var(--draw); }

        /* 胜率统计卡片 */
        .stats-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            flex: 1;
            background: var(--card);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        }
        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .stat-value.win-rate { color: var(--win); }
        .stat-value.total-games { color: var(--gold); }
        .stat-value.streak { color: #9b59b6; }
        .stat-label {
            font-size: 0.7rem;
            color: #888;
            letter-spacing: 1px;
        }

        /* 对战区域 */
        .battle-area {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 16px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .round-indicator {
            font-size: 0.8rem;
            color: #777;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        /* 对决显示 */
        .versus-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            margin-bottom: 4px;
        }
        .choice-display {
            text-align: center;
            flex: 1;
        }
        .choice-emoji {
            font-size: 4rem;
            display: block;
            transition: transform 0.2s ease;
        }
        .choice-emoji.slam {
            animation: slamDown 0.5s ease-out;
        }
        @keyframes slamDown {
            0% { transform: translateY(-60px) scale(1.6); opacity: 0; }
            60% { transform: translateY(4px) scale(0.95); }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .choice-name {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 4px;
        }
        .vs-text {
            font-size: 1.6rem;
            font-weight: 900;
            color: #555;
            flex-shrink: 0;
        }

        /* 结果提示 */
        .result-banner {
            text-align: center;
            margin-top: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            min-height: 28px;
            transition: all 0.3s ease;
        }
        .result-banner.win { color: var(--win); }
        .result-banner.lose { color: var(--lose); }
        .result-banner.draw { color: var(--draw); }

        /* 等待状态 */
        .waiting-text {
            color: #666;
            font-size: 1rem;
            letter-spacing: 2px;
        }
        .waiting-dots::after {
            content: '';
            animation: dots 1.5s steps(3, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }

        /* 选择按钮 */
        .choices {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .choice-btn {
            flex: 1;
            padding: 16px 10px;
            font-size: 2.8rem;
            background: var(--card);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .choice-btn:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(233, 68, 96, 0.25);
            background: #1e2d50;
        }
        .choice-btn:active {
            transform: scale(0.94);
            transition: transform 0.1s;
        }
        .choice-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(30%);
        }
        .choice-btn .btn-label {
            display: block;
            font-size: 0.7rem;
            color: #aaa;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* 操作按钮 */
        .actions {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            color: var(--text);
        }
        .btn-reset {
            background: transparent;
            color: #999;
        }
        .btn-reset:hover {
            background: rgba(231, 76, 60, 0.15);
            border-color: var(--lose);
            color: var(--lose);
        }
        .btn-auto {
            background: transparent;
            color: #999;
        }
        .btn-auto:hover {
            background: rgba(240, 165, 0, 0.15);
            border-color: var(--gold);
            color: var(--gold);
        }
        .btn-auto.active {
            background: rgba(240, 165, 0, 0.2);
            border-color: var(--gold);
            color: var(--gold);
        }

        /* 历史记录 */
        .history {
            background: var(--card);
            border-radius: 14px;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        .history-title {
            font-size: 0.75rem;
            color: #777;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 80px;
            overflow-y: auto;
        }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .history-dot {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
            transition: transform 0.15s;
        }
        .history-dot:hover { transform: scale(1.2); }
        .history-dot.win { background: rgba(46, 204, 113, 0.2); }
        .history-dot.lose { background: rgba(231, 76, 60, 0.2); }
        .history-dot.draw { background: rgba(243, 156, 18, 0.2); }

        .no-history {
            color: #555;
            font-size: 0.8rem;
            text-align: center;
            width: 100%;
            padding: 8px 0;
        }

        /* 响应式 */
        @media (max-width: 420px) {
            .title { font-size: 1.6rem; }
            .choice-btn { font-size: 2.2rem; padding: 14px 6px; }
            .choice-emoji { font-size: 3rem; }
            .score-value { font-size: 1.5rem; }
            .stat-value { font-size: 1.1rem; }
            .battle-area { min-height: 180px; padding: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <h1 class="title">
            <span>石</span><span>头</span><span>剪</span><span>刀</span><span>布</span>
        </h1>
        <p class="subtitle">✊ ✌️ ✋ 经典对决</p>

        <!-- 计分板 -->
        <div class="scoreboard">
            <div class="score-item player">
                <div class="score-label">🧑 你</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score-divider"></div>
            <div class="score-item draws">
                <div class="score-label">🤝 平局</div>
                <div class="score-value" id="drawScore">0</div>
            </div>
            <div class="score-divider"></div>
            <div class="score-item computer">
                <div class="score-label">🤖 电脑</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <!-- 胜率统计 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value win-rate" id="winRate">0%</div>
                <div class="stat-label">🏆 胜率</div>
            </div>
            <div class="stat-card">
                <div class="stat-value total-games" id="totalGames">0</div>
                <div class="stat-label">📊 总场次</div>
            </div>
            <div class="stat-card">
                <div class="stat-value streak" id="streak">-</div>
                <div class="stat-label">🔥 连胜</div>
            </div>
        </div>

        <!-- 对战区域 -->
        <div class="battle-area" id="battleArea">
            <div class="round-indicator" id="roundIndicator">第 0 回合</div>
            <div class="versus-display">
                <div class="choice-display">
                    <span class="choice-emoji" id="playerChoice">❓</span>
                    <span class="choice-name">你</span>
                </div>
                <div class="vs-text">VS</div>
                <div class="choice-display">
                    <span class="choice-emoji" id="computerChoice">❓</span>
                    <span class="choice-name">电脑</span>
                </div>
            </div>
            <div class="result-banner" id="resultBanner"></div>
        </div>

        <!-- 选择按钮 -->
        <div class="choices">
            <button class="choice-btn" data-choice="rock" id="btnRock">
                ✊<span class="btn-label">石头</span>
            </button>
            <button class="choice-btn" data-choice="scissors" id="btnScissors">
                ✌️<span class="btn-label">剪刀</span>
            </button>
            <button class="choice-btn" data-choice="paper" id="btnPaper">
                ✋<span class="btn-label">布</span>
            </button>
        </div>

        <!-- 操作按钮 -->
        <div class="actions">
            <button class="action-btn btn-auto" id="btnAuto" title="自动对战10局">⚡ 自动对战 ×10</button>
            <button class="action-btn btn-reset" id="btnReset">🔄 重置数据</button>
        </div>

        <!-- 历史记录 -->
        <div class="history" style="margin-top: 12px;">
            <div class="history-title">
                <span>📜 对战记录</span>
                <span style="font-size:0.7rem;color:#555;" id="historySummary"></span>
            </div>
            <div class="history-list" id="historyList">
                <span class="no-history">还没有对战记录，来一局吧！</span>
            </div>
        </div>
    </div>

    <script>
        (function () {
            // ============ 状态管理 ============
            const state = {
                playerScore: 0,
                computerScore: 0,
                drawScore: 0,
                currentStreak: 0,       // 当前连胜（正=连胜，负=连败，0=无）
                streakType: null,        // 'win' | 'lose' | null
                history: [],             // [{ player, computer, result }, ...]
                totalGames: 0,
                isAnimating: false,
                autoMode: false,
                autoTimer: null,
            };

            // 映射
            const choiceMap = {
                rock: { emoji: '✊', name: '石头', beats: 'scissors' },
                scissors: { emoji: '✌️', name: '剪刀', beats: 'paper' },
                paper: { emoji: '✋', name: '布', beats: 'rock' },
            };

            const choices = ['rock', 'scissors', 'paper'];

            // ============ DOM 引用 ============
            const $ = (id) => document.getElementById(id);
            const dom = {
                playerScore: $('playerScore'),
                computerScore: $('computerScore'),
                drawScore: $('drawScore'),
                winRate: $('winRate'),
                totalGames: $('totalGames'),
                streak: $('streak'),
                roundIndicator: $('roundIndicator'),
                playerChoice: $('playerChoice'),
                computerChoice: $('computerChoice'),
                resultBanner: $('resultBanner'),
                battleArea: $('battleArea'),
                historyList: $('historyList'),
                historySummary: $('historySummary'),
                btnRock: $('btnRock'),
                btnScissors: $('btnScissors'),
                btnPaper: $('btnPaper'),
                btnAuto: $('btnAuto'),
                btnReset: $('btnReset'),
            };

            // ============ 工具函数 ============
            function getRandomChoice() {
                return choices[Math.floor(Math.random() * 3)];
            }

            function getResult(player, computer) {
                if (player === computer) return 'draw';
                if (choiceMap[player].beats === computer) return 'win';
                return 'lose';
            }

            function calcWinRate() {
                if (state.totalGames === 0) return '0%';
                const rate = (state.playerScore / state.totalGames) * 100;
                return rate.toFixed(1) + '%';
            }

            function getStreakText() {
                if (state.currentStreak === 0) return '-';
                const prefix = state.currentStreak > 0 ? '🏆' : '💔';
                return prefix + ' ' + Math.abs(state.currentStreak);
            }

            // ============ 渲染 ============
            function updateUI() {
                dom.playerScore.textContent = state.playerScore;
                dom.computerScore.textContent = state.computerScore;
                dom.drawScore.textContent = state.drawScore;
                dom.winRate.textContent = calcWinRate();
                dom.totalGames.textContent = state.totalGames;
                dom.streak.textContent = getStreakText();
                dom.roundIndicator.textContent = '第 ' + state.totalGames + ' 回合';
                renderHistory();
            }

            function pulseElement(el) {
                el.classList.remove('pulse');
                void el.offsetWidth; // 触发回流
                el.classList.add('pulse');
            }

            function renderHistory() {
                const list = dom.historyList;
                list.innerHTML = '';
                if (state.history.length === 0) {
                    list.innerHTML = '<span class="no-history">还没有对战记录，来一局吧！</span>';
                    dom.historySummary.textContent = '';
                    return;
                }
                // 只显示最近 30 条
                const recent = state.history.slice(-30);
                recent.forEach((h) => {
                    const dot = document.createElement('span');
                    dot.className = 'history-dot ' + h.result;
                    dot.textContent = h.result === 'win' ? '✅' : h.result === 'lose' ? '❌' : '➖';
                    dot.title = `你:${choiceMap[h.player].name} vs 电脑:${choiceMap[h.computer].name} — ${h.result === 'win' ? '胜' : h.result === 'lose' ? '负' : '平'}`;
                    list.appendChild(dot);
                });
                list.scrollTop = list.scrollHeight;
                // 摘要
                const w = state.history.filter(h => h.result === 'win').length;
                const l = state.history.filter(h => h.result === 'lose').length;
                const d = state.history.filter(h => h.result === 'draw').length;
                dom.historySummary.textContent = `${w}胜 ${l}负 ${d}平`;
            }

            function showResult(playerChoice, computerChoice, result) {
                // 更新显示
                dom.playerChoice.textContent = choiceMap[playerChoice].emoji;
                dom.computerChoice.textContent = choiceMap[computerChoice].emoji;

                // 动画
                dom.playerChoice.classList.remove('slam');
                dom.computerChoice.classList.remove('slam');
                void dom.playerChoice.offsetWidth;
                dom.playerChoice.classList.add('slam');
                dom.computerChoice.classList.add('slam');

                // 结果横幅
                const banner = dom.resultBanner;
                banner.className = 'result-banner';
                if (result === 'win') {
                    banner.textContent = '🎉 你赢了！';
                    banner.classList.add('win');
                } else if (result === 'lose') {
                    banner.textContent = '😢 你输了！';
                    banner.classList.add('lose');
                } else {
                    banner.textContent = '🤝 平局！';
                    banner.classList.add('draw');
                }

                // 脉冲对应分数
                if (result === 'win') pulseElement(dom.playerScore);
                else if (result === 'lose') pulseElement(dom.computerScore);
                else pulseElement(dom.drawScore);
            }

            // ============ 游戏逻辑 ============
            function playRound(playerChoice) {
                if (state.isAnimating) return;
                state.isAnimating = true;

                const computerChoice = getRandomChoice();
                const result = getResult(playerChoice, computerChoice);

                // 更新状态
                state.totalGames++;
                state.history.push({ player: playerChoice, computer: computerChoice, result });

                if (result === 'win') {
                    state.playerScore++;
                    if (state.streakType === 'win') {
                        state.currentStreak++;
                    } else {
                        state.streakType = 'win';
                        state.currentStreak = 1;
                    }
                } else if (result === 'lose') {
                    state.computerScore++;
                    if (state.streakType === 'lose') {
                        state.currentStreak--;
                    } else {
                        state.streakType = 'lose';
                        state.currentStreak = -1;
                    }
                } else {
                    state.drawScore++;
                    state.currentStreak = 0;
                    state.streakType = null;
                }

                // 显示结果
                showResult(playerChoice, computerChoice, result);
                updateUI();

                // 动画锁
                setTimeout(() => {
                    state.isAnimating = false;
                }, 400);
            }

            function setButtonsEnabled(enabled) {
                dom.btnRock.disabled = !enabled;
                dom.btnScissors.disabled = !enabled;
                dom.btnPaper.disabled = !enabled;
            }

            // ============ 自动对战 ============
            function startAutoMode() {
                if (state.autoMode) return;
                state.autoMode = true;
                dom.btnAuto.textContent = '⏹ 停止自动';
                dom.btnAuto.classList.add('active');
                setButtonsEnabled(false);
                runAutoRound();
            }

            function stopAutoMode() {
                state.autoMode = false;
                dom.btnAuto.textContent = '⚡ 自动对战 ×10';
                dom.btnAuto.classList.remove('active');
                if (state.autoTimer) {
                    clearTimeout(state.autoTimer);
                    state.autoTimer = null;
                }
                setButtonsEnabled(true);
            }

            function runAutoRound() {
                if (!state.autoMode) {
                    setButtonsEnabled(true);
                    return;
                }
                const playerChoice = getRandomChoice();
                playRound(playerChoice);
                state.autoTimer = setTimeout(() => {
                    runAutoRound();
                }, 600);
            }

            // 自动对战10局
            function autoPlay10() {
                if (state.isAnimating || state.autoMode) return;

                let remaining = 10;
                setButtonsEnabled(false);
                dom.btnAuto.disabled = true;

                function runNext() {
                    if (remaining <= 0) {
                        setButtonsEnabled(true);
                        dom.btnAuto.disabled = false;
                        return;
                    }
                    const playerChoice = getRandomChoice();
                    playRound(playerChoice);
                    remaining--;
                    setTimeout(runNext, 550);
                }
                runNext();
            }

            // ============ 重置 ============
            function resetAll() {
                stopAutoMode();
                state.playerScore = 0;
                state.computerScore = 0;
                state.drawScore = 0;
                state.currentStreak = 0;
                state.streakType = null;
                state.history = [];
                state.totalGames = 0;
                state.isAnimating = false;

                dom.playerChoice.textContent = '❓';
                dom.computerChoice.textContent = '❓';
                dom.resultBanner.textContent = '';
                dom.resultBanner.className = 'result-banner';
                setButtonsEnabled(true);
                updateUI();
            }

            // ============ 事件绑定 ============
            dom.btnRock.addEventListener('click', () => playRound('rock'));
            dom.btnScissors.addEventListener('click', () => playRound('scissors'));
            dom.btnPaper.addEventListener('click', () => playRound('paper'));

            dom.btnAuto.addEventListener('click', () => {
                if (state.autoMode) {
                    stopAutoMode();
                } else {
                    autoPlay10();
                }
            });

            dom.btnReset.addEventListener('click', () => {
                if (confirm('确定要重置所有数据吗？此操作不可撤销。')) {
                    resetAll();
                }
            });

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (state.isAnimating) return;
                switch (e.key.toLowerCase()) {
                    case '1':
                    case 'a':
                        playRound('rock');
                        break;
                    case '2':
                    case 's':
                        playRound('scissors');
                        break;
                    case '3':
                    case 'd':
                        playRound('paper');
                        break;
                    case 'r':
                        if (!e.ctrlKey && !e.metaKey) {
                            if (confirm('确定要重置所有数据吗？')) resetAll();
                        }
                        break;
                    case ' ':
                        e.preventDefault();
                        if (!state.autoMode) {
                            autoPlay10();
                        }
                        break;
                }
            });

            // ============ 初始化 ============
            updateUI();
            console.log('🪨 📄 ✂️  石头剪刀布游戏已就绪！');
            console.log('  🖱️  点击按钮选择');
            console.log('  ⌨️  键盘快捷键: 1/A=石头  2/S=剪刀  3/D=布  空格=自动10局  R=重置');
        })();
    </script>
</body>
</html>
